<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Dj Bites Pro · Premium Food Ordering</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* Complete CSS from previous version - keeping it exactly the same */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a1a1a 0%, #2d2d2d 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px 12px 20px;
        }

        .dj-container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px 40px 32px 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            padding: 20px 18px 24px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            animation: containerAppear 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            transition: all 0.5s ease;
        }

        .dj-container.outlet-closed {
            opacity: 0.7;
            filter: grayscale(20%);
        }

        @keyframes containerAppear {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .firecracker-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
            border-radius: 40px;
        }

        .cracker {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff0, #f90, #f00);
            filter: blur(1px);
            animation: explode 3s infinite;
            opacity: 0;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            25% { transform: translate(var(--tx1), var(--ty1)) scale(1.5); opacity: 0.8; }
            50% { transform: translate(var(--tx2), var(--ty2)) scale(2); opacity: 0.6; background: radial-gradient(circle, #f90, #f00, #ff0); }
            75% { transform: translate(var(--tx3), var(--ty3)) scale(1.2); opacity: 0.3; }
            100% { transform: translate(var(--tx4), var(--ty4)) scale(0); opacity: 0; }
        }

        .cracker:nth-child(1) { --tx1: 50px; --ty1: -30px; --tx2: 100px; --ty2: -60px; --tx3: 150px; --ty3: -30px; --tx4: 200px; --ty4: 0px; top: 20%; left: 10%; animation-delay: 0s; }
        .cracker:nth-child(2) { --tx1: -40px; --ty1: -50px; --tx2: -80px; --ty2: -100px; --tx3: -120px; --ty3: -50px; --tx4: -160px; --ty4: 0px; top: 30%; right: 10%; animation-delay: 0.5s; }
        .cracker:nth-child(3) { --tx1: 60px; --ty1: 40px; --tx2: 120px; --ty2: 80px; --tx3: 180px; --ty3: 40px; --tx4: 240px; --ty4: 0px; bottom: 20%; left: 20%; animation-delay: 1s; }
        .cracker:nth-child(4) { --tx1: -50px; --ty1: 30px; --tx2: -100px; --ty2: 60px; --tx3: -150px; --ty3: 30px; --tx4: -200px; --ty4: 0px; bottom: 30%; right: 20%; animation-delay: 1.5s; }

        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 8px;
            animation: slideDown 0.6s ease;
            background: linear-gradient(145deg, #fff8f0, #fff);
            border-radius: 60px;
            padding: 12px 20px;
            box-shadow: 0 10px 25px rgba(252, 128, 25, 0.15);
            position: relative;
            overflow: hidden;
            z-index: 5;
        }

        .logo-firecracker {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #ffaa00, #ff5500);
            border-radius: 50%;
            pointer-events: none;
            animation: logoSpark 2s infinite;
        }

        @keyframes logoSpark {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            25% { transform: scale(1.5) rotate(90deg); opacity: 0.8; }
            50% { transform: scale(2) rotate(180deg); opacity: 0.6; background: radial-gradient(circle, #ff5500, #ffaa00); }
            75% { transform: scale(1.5) rotate(270deg); opacity: 0.4; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        .logo-firecracker:nth-child(1) { top: 10px; left: 20px; animation-delay: 0s; }
        .logo-firecracker:nth-child(2) { top: 5px; right: 30px; animation-delay: 0.3s; }
        .logo-firecracker:nth-child(3) { bottom: 5px; left: 40px; animation-delay: 0.6s; }
        .logo-firecracker:nth-child(4) { bottom: 10px; right: 20px; animation-delay: 0.9s; }
        .logo-firecracker:nth-child(5) { top: 50%; left: 10px; animation-delay: 1.2s; }
        .logo-firecracker:nth-child(6) { top: 50%; right: 10px; animation-delay: 1.5s; }

        .brand-title {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            z-index: 6;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #fc8019, #ff5722);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(252, 128, 25, 0.4);
            transform: rotate(10deg);
            transition: all 0.3s;
            animation: logoFloat 3s infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: rotate(10deg) scale(1); }
            50% { transform: rotate(15deg) scale(1.05); }
        }

        .logo-icon i {
            font-size: 2rem;
            color: white;
            transform: rotate(-10deg);
        }

        .logo-text h2 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fc8019, #ff5722);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Dancing Script', cursive;
        }

        .logo-tagline {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
        }

        .pure-veg-tag {
            background: linear-gradient(145deg, #0a7e07, #1e7b4c);
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .outlet-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 40px;
            margin-bottom: 15px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: all 0.5s ease;
        }

        .status-dot.open {
            background: #0a7e07;
            box-shadow: 0 0 10px #0a7e07;
            animation: pulse 1.5s infinite;
        }

        .status-dot.closed {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Order History Button - Now ONLY in Admin Panel */
        .admin-order-section {
            background: linear-gradient(145deg, #f0f0f0, #e5e5e5);
            border-radius: 30px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #fc8019;
        }

        .admin-order-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .admin-order-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fc8019;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-order-stats {
            display: flex;
            gap: 15px;
        }

        .admin-stat-box {
            background: white;
            padding: 8px 15px;
            border-radius: 40px;
            text-align: center;
        }

        .admin-stat-number {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fc8019;
            line-height: 1;
        }

        .admin-stat-label {
            font-size: 0.7rem;
            color: #666;
        }

        .admin-clear-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .admin-clear-btn:hover {
            background: #ff0000;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 68, 68, 0.3);
        }

        .admin-view-orders-btn {
            background: #fc8019;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .admin-view-orders-btn:hover {
            background: #ff5722;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(252, 128, 25, 0.4);
        }

        /* Order counter - HIDDEN from customers */
        .order-counter-badge {
            display: none !important;
        }

        .admin-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-btn {
            background: #333;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .admin-btn:hover {
            background: #fc8019;
            transform: translateY(-2px);
        }

        .admin-indicator {
            background: linear-gradient(145deg, #fc8019, #ff5722);
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logout-btn {
            background: #eee;
            color: #333;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #ddd;
        }

        .admin-settings-panel {
            background: linear-gradient(145deg, #fff9f2, #fff);
            border-radius: 30px;
            padding: 20px;
            margin: 15px 0;
            border: 2px solid #fc8019;
            animation: panelSlide 0.5s;
        }

        @keyframes panelSlide {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .admin-toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 50px;
        }

        .toggle-switch-container {
            display: flex;
            align-items: center;
            gap: 10px;
            perspective: 200px;
        }

        .toggle-switch {
            position: relative;
            width: 70px;
            height: 34px;
            background: #ccc;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            transform-style: preserve-3d;
            animation: toggleIdle 3s infinite;
        }

        @keyframes toggleIdle {
            0%, 100% { transform: rotateY(0deg); }
            25% { transform: rotateY(5deg); }
            75% { transform: rotateY(-5deg); }
        }

        .toggle-switch.active {
            background: linear-gradient(145deg, #0a7e07, #1e7b4c);
            animation: toggleActive 3s infinite;
        }

        @keyframes toggleActive {
            0%, 100% { transform: rotateY(0deg) scale(1); }
            25% { transform: rotateY(10deg) scale(1.05); }
            75% { transform: rotateY(-10deg) scale(1.05); }
        }

        .toggle-switch:active {
            transform: scale(0.95) rotateY(180deg);
            transition: transform 0.2s;
        }

        .toggle-slider {
            position: absolute;
            width: 28px;
            height: 28px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transform: translateZ(5px);
        }

        .toggle-switch.active .toggle-slider {
            left: 39px;
            transform: translateZ(10px) scale(1.1);
        }

        .toggle-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #333;
        }

        .add-item-section {
            background: linear-gradient(145deg, #fff0e0, #ffe0c0);
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
            border: 2px dashed #fc8019;
            animation: addItemPulse 2s infinite;
        }

        @keyframes addItemPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(252, 128, 25, 0.4); }
            50% { box-shadow: 0 0 20px 5px rgba(252, 128, 25, 0.6); }
        }

        .add-item-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fc8019;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .add-item-input {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid #fc8019;
            border-radius: 40px;
            font-size: 0.95rem;
            margin: 8px 0;
        }

        .add-item-input:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(252, 128, 25, 0.2);
        }

        .add-item-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }

        .add-item-btn {
            background: linear-gradient(145deg, #fc8019, #ff5722);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .add-item-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(252, 128, 25, 0.4);
        }

        .admin-input {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid #fc8019;
            border-radius: 40px;
            font-size: 0.95rem;
            margin: 10px 0;
        }

        .save-btn {
            background: linear-gradient(145deg, #2e7d32, #1b5e20);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.3);
        }

        .category-tabs {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 8px 0 20px;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
            white-space: nowrap;
            border: 2px solid #eee;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .category-tab i {
            color: #fc8019;
        }

        .category-tab:hover, .category-tab.active {
            background: #fc8019;
            color: white;
            border-color: #fc8019;
            transform: translateY(-2px);
        }

        .category-tab:hover i, .category-tab.active i {
            color: white;
        }

        .category-section {
            margin: 25px 0 15px;
            scroll-margin-top: 20px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 3px solid #fc8019;
        }

        .category-header i {
            font-size: 1.5rem;
            color: #fc8019;
            background: #fff4e5;
            padding: 8px;
            border-radius: 50%;
        }

        .category-header h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1f1f1f;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 15px;
            border-radius: 24px;
            margin-bottom: 12px;
            border: 2px solid #f0f0f0;
            transition: all 0.3s;
            position: relative;
            opacity: 1;
        }

        .menu-item.out-of-stock {
            opacity: 0.5;
            background: #f5f5f5;
            border-color: #ff4444;
            filter: grayscale(50%);
        }

        .menu-item.out-of-stock .qty-control {
            opacity: 0.3;
            pointer-events: none;
        }

        .out-of-stock-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4444;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            z-index: 10;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .menu-item:hover {
            transform: translateX(5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .item-image-block {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .item-image-block:hover {
            transform: scale(1.05);
        }

        .item-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .image-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #f5f5f5, #e5e5e5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 1.5rem;
            pointer-events: none;
        }

        .image-placeholder span {
            font-size: 0.6rem;
        }

        /* Zoom Modal */
        .zoom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: zoomFadeIn 0.3s;
        }

        @keyframes zoomFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .zoom-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
            animation: zoomIn 0.3s;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .zoom-image {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border: 3px solid white;
        }

        .zoom-close {
            position: absolute;
            top: -40px;
            right: -40px;
            background: #fc8019;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }

        .zoom-close:hover {
            transform: rotate(90deg);
            background: #ff4444;
        }

        .zoom-item-name {
            position: absolute;
            bottom: -40px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .item-info {
            flex: 2;
        }

        .item-name {
            font-weight: 600;
            font-size: 1rem;
            color: #1f1f1f;
            margin-bottom: 5px;
        }

        .item-price {
            font-weight: 700;
            color: #fc8019;
            font-size: 1.1rem;
        }

        .admin-name-input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #fc8019;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 5px;
        }

        .admin-name-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(252, 128, 25, 0.2);
        }

        .admin-price-input {
            width: 80px;
            padding: 5px 8px;
            border: 2px solid #fc8019;
            border-radius: 20px;
            font-weight: 600;

        let outOfStockItems = [];

        // ---------- BASE MENU ----------
        const BASE_ITEMS = [

            { id: 'cheese-addon', name: 'Cheese Slice Add-on', basePrice: 10, category: '🍔 Burgers' },
            { id: 'spring-potato', name: 'Special Tandoori Spring Potato', basePrice: 39, category: '🥔 Spring Potato' },
            { id: 'fries-half', name: 'French Fries (Half)', basePrice: 20, category: '🍟 French Fries' },
            { id: 'fries-full', name: 'French Fries (Full)', basePrice: 30, category: '🍟 French Fries' }
        ];

        // ---------- STATE ----------
        let menuItems = [];
        let quantities = {};
        let itemImages = {};
        let adminActive = false;
        let orders = JSON.parse(localStorage.getItem('dj_bites_orders')) || [];

        // ========== FIREBASE REAL-TIME LISTENERS ==========
        
        // 1. WhatsApp number
        db.collection('settings').doc('whatsapp').onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                whatsappNumber = data.number || whatsappNumber;
                whatsappDisplay = data.display || whatsappDisplay;
                
                const modalPhone = document.getElementById('modalPhone');
                if (modalPhone) modalPhone.textContent = whatsappDisplay;
                
                localStorage.setItem('dj_bites_whatsapp', JSON.stringify({ 
                    number: whatsappNumber, 
                    display: whatsappDisplay 
                }));
                
                console.log('✅ WhatsApp updated:', whatsappDisplay);
            }
        });

        // 2. Outlet status
        db.collection('settings').doc('outlet').onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                outletOpen = data.status === 'open';
                
                updateOutletUI();
                localStorage.setItem('dj_bites_outlet', outletOpen.toString());
                
                console.log('✅ Outlet updated:', outletOpen ? 'OPEN' : 'CLOSED');
            }
        });

        // 3. OUT OF STOCK ITEMS - DEBUG VERSION
        console.log('🔍 Setting up outOfStock listener...');
        db.collection('settings').doc('outOfStock').onSnapshot((doc) => {
            console.log('🔍 outOfStock snapshot received!');
            if (doc.exists) {
                const data = doc.data();
                console.log('✅ outOfStock data from Firebase:', data);
                outOfStockItems = data.items || [];
                
                // Save to localStorage
                localStorage.setItem('dj_bites_out_of_stock', JSON.stringify(outOfStockItems));
                
                // Re-render menu
                renderMenu();
                
                console.log('✅ Out of stock updated:', outOfStockItems);
                showNotification('📦 Stock status updated!');
            } else {
                console.log('⚠️ outOfStock document does not exist yet');
                // Document doesn't exist, create default
                db.collection('settings').doc('outOfStock').set({
                    items: [],
                    updatedAt: new Date()
                }).then(() => {
                    console.log('✅ Created default outOfStock document');
                }).catch((error) => {
                    console.error('❌ Error creating outOfStock:', error);
                });
            }
        }, (error) => {
            console.error('❌ outOfStock listener error:', error);
        });

        // ========== JSONBIN.IO FUNCTIONS ==========
        
        async function loadImagesFromJSONBin() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                const data = await response.json();
                if (data.record && data.record.images) {
                    itemImages = data.record.images;
                    localStorage.setItem('dj_bites_images', JSON.stringify(itemImages));
                    renderMenu();
                }
            } catch (error) {
                console.error('Error loading from JSONBin:', error);
                const storedImages = localStorage.getItem('dj_bites_images');
                if (storedImages) {
                    try {
                        itemImages = JSON.parse(storedImages) || {};
                    } catch { 
                        itemImages = {}; 
                    }
                }
            }
        }

        async function saveImagesToJSONBin() {
            if (!USE_JSONBIN) return;
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                const data = await response.json();
                let existingData = data.record || {};
                existingData.images = itemImages;
                
                await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(existingData)
                });
            } catch (error) {
                console.error('Error saving to JSONBin:', error);
            }
        }

        // ========== IMAGE UPLOAD ==========
        window.uploadImage = async function(input, itemId) {
            const file = input.files[0];
            if (!file) return;

            showUploadProgress(true);
            showNotification('📤 Uploading to ImgBB...');

            const formData = new FormData();
            formData.append("image", file);

            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();
                
                if (data.success) {
                    const imageUrl = data.data.url;
                    itemImages[itemId] = imageUrl;
                    localStorage.setItem('dj_bites_images', JSON.stringify(itemImages));
                    
                    await saveImagesToJSONBin();
                    
                    const imgElement = document.getElementById("img_" + itemId);
                    if (imgElement) {
                        if (imgElement.tagName === 'IMG') {
                            imgElement.src = imageUrl;
                        } else {
                            const parentDiv = imgElement.parentElement;
                            const newImg = document.createElement('img');
                            newImg.className = 'item-image';
                            newImg.id = 'img_' + itemId;
                            newImg.src = imageUrl;
                            parentDiv.innerHTML = '';
                            parentDiv.appendChild(newImg);
                        }
                    }
                    
                    showUploadProgress(false);
                    showNotification("✅ Image uploaded!");
                }
            } catch (err) {
                showUploadProgress(false);
                showNotification("❌ Upload failed");
            }
            input.value = '';
        };

        // ========== ZOOM FUNCTION ==========
        window.zoomImage = function(itemId, itemName) {
            const imageUrl = itemImages[itemId];
            if (!imageUrl) {
                showNotification('❌ No image');
                return;
            }
            document.getElementById('zoomImage').src = imageUrl;
            document.getElementById('zoomItemName').textContent = itemName;
            document.getElementById('zoomModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        window.closeZoomModal = function() {
            document.getElementById('zoomModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        // Load saved images
        window.loadSavedImages = async function() {
            await loadImagesFromJSONBin();
            
            document.querySelectorAll('[id^="img_"]').forEach(element => {
                const itemId = element.id.replace("img_", "");
                const saved = itemImages[itemId];
                
                if (saved) {
                    if (element.tagName === 'IMG') {
                        element.src = saved;
                    } else {
                        const parentDiv = element.parentElement;
                        const newImg = document.createElement('img');
                        newImg.className = 'item-image';
                        newImg.id = 'img_' + itemId;
                        newImg.src = saved;
                        parentDiv.innerHTML = '';
                        parentDiv.appendChild(newImg);
                    }
                }
            });
        };

        // WhatsApp update
        window.updateWhatsAppNumber = async function() {

            const newDisplay = document.getElementById('waDisplayInput')?.value.trim();
            
            if (newNumber) {
                const cleanNumber = newNumber.replace(/[^0-9]/g, '');
                if (cleanNumber.length >= 10) {
                    await db.collection('settings').doc('whatsapp').set({
                        number: cleanNumber,
                        display: newDisplay || cleanNumber,
                        updatedAt: new Date()
                    });
                    showNotification('✅ WhatsApp updated for all!');
                }
            }
        };

        window.toggleOutlet = async function() {

            });

        window.toggleStock = async function(itemId) {
            console.log('🔍 Toggle stock for:', itemId);
            console.log('🔍 Current outOfStockItems:', outOfStockItems);
            
            let newOutOfStock = [...outOfStockItems];
            
            if (newOutOfStock.includes(itemId)) {
                newOutOfStock = newOutOfStock.filter(id => id !== itemId);
                console.log('🔍 Removing from out of stock');
            } else {
                newOutOfStock.push(itemId);
                console.log('🔍 Adding to out of stock');
            }
            
            console.log('🔍 New outOfStockItems:', newOutOfStock);
            
            try {
                // Firebase me save karo

                try {
                    outOfStockItems = JSON.parse(storedOutOfStock) || [];

                } catch { 
                    outOfStockItems = []; 
                }

            const storedPrices = localStorage.getItem('dj_bites_prices');
            if (storedPrices) {
                try {
                    const priceMap = JSON.parse(storedPrices);
                    menuItems = BASE_ITEMS.map(item => ({
                        ...item,
                        price: priceMap[item.id] !== undefined ? priceMap[item.id] : item.basePrice
                    }));
                } catch { fallback(); }
            } else { fallback(); }
            
            function fallback() {
                menuItems = BASE_ITEMS.map(item => ({ ...item, price: item.basePrice }));
            }

            const storedItems = localStorage.getItem('dj_bites_custom_items');
            if (storedItems) {
                try {

                    customItems.forEach(customItem => {
                        if (!menuItems.find(item => item.id === customItem.id)) {
                            menuItems.push(customItem);
                        }
                    });
                } catch { }
            }

            const storedImages = localStorage.getItem('dj_bites_images');
            if (storedImages) {
                try { 
                    itemImages = JSON.parse(storedImages) || {};
                } catch { 
                    itemImages = {}; 
                }

            const storedWA = localStorage.getItem('dj_bites_whatsapp');

                try {
                    const wa = JSON.parse(storedWA);
                    if (wa.number) whatsappNumber = wa.number;

            const storedNames = localStorage.getItem('dj_bites_names');

        // Audio System
        let audioCtx = null;
        let masterGain = null;
        let lastSoundTime = 0;
        const SOUND_COOLDOWN = 100;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.connect(audioCtx.destination);
                masterGain.gain.value = 0.25;
            }
            return audioCtx;
        }

        function playSound(type) {
            try {
                const now = Date.now();
                if (now - lastSoundTime < SOUND_COOLDOWN) return;
                lastSoundTime = now;

                const ctx = initAudio();
                if (ctx.state === 'suspended') {
                    ctx.resume().then(() => playSound(type));
                    return;
                }

                const currentTime = ctx.currentTime;
                
                if (type === 'click') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(masterGain);
                    
                    osc.frequency.value = 620;
                    gain.gain.setValueAtTime(0.12, currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.08);
                    
                    osc.start(currentTime);
                    osc.stop(currentTime + 0.08);
                }
                else if (type === 'add') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(masterGain);
                    
                    osc.frequency.value = 740;
                    gain.gain.setValueAtTime(0.15, currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.1);
                    
                    osc.start(currentTime);
                    osc.stop(currentTime + 0.1);
                }
                else if (type === 'remove') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(masterGain);
                    
                    osc.frequency.value = 440;
                    gain.gain.setValueAtTime(0.12, currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.12);
                    
                    osc.start(currentTime);
                    osc.stop(currentTime + 0.12);
                }
                else if (type === 'order') {
                    const notes = [523, 659, 783, 880];
                    notes.forEach((freq, i) => {
                        setTimeout(() => {
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.connect(gain);
                            gain.connect(masterGain);
                            
                            osc.frequency.value = freq;
                            gain.gain.setValueAtTime(0.2, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                            
                            osc.start();
                            osc.stop(ctx.currentTime + 0.15);
                        }, i * 120);
                    }, this);
                }
                else if (type === 'success') {
                    const osc1 = ctx.createOscillator();
                    const osc2 = ctx.createOscillator();
                    const gain = ctx.createGain();
                    
                    osc1.connect(gain);
                    osc2.connect(gain);
                    gain.connect(masterGain);
                    
                    osc1.frequency.value = 659;
                    osc2.frequency.value = 1318;
                    
                    gain.gain.setValueAtTime(0.15, currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.25);
                    
                    osc1.start(currentTime);
                    osc2.start(currentTime);
                    osc1.stop(currentTime + 0.25);
                    osc2.stop(currentTime + 0.25);
                }
                else if (type === 'error') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(masterGain);
                    
                    osc.frequency.value = 220;
                    gain.gain.setValueAtTime(0.15, currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.2);
                    
                    osc.start(currentTime);
                    osc.stop(currentTime + 0.2);
                }
                else if (type === 'toggle') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(masterGain);
                    
                    osc.frequency.value = 880;
                    gain.gain.setValueAtTime(0.1, currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, currentTime + 0.05);
                    
                    osc.start(currentTime);
                    osc.stop(currentTime + 0.05);
                }
            } catch (e) { /* Silent fallback */ }
        }

        window.updateQty = function(id, delta) {
            if (!outletOpen) {

            if (outOfStockItems.includes(id)) {
                alert('❌ This item is currently out of stock');

            const newVal = (quantities[id] || 0) + delta;

            let totalItems = 0, totalPrice = 0;
            menuItems.forEach(item => {

                    totalItems += q;
                    totalPrice += q * item.price;

            });

            return `${date}${month}${year}-${random}`;

        function placeOrder(customerName) {
            let orderLines = [], orderItems = [], totalPrice = 0;
            
            menuItems.forEach(item => {
                if (outOfStockItems.includes(item.id)) return;
                const qty = quantities[item.id] || 0;
                if (qty > 0) {
                    const itemTotal = qty * item.price;
                    totalPrice += itemTotal;
                    orderLines.push(`• ${item.name} × ${qty} = ₹${itemTotal}`);
                    orderItems.push({ name: item.name, qty: qty, price: item.price, total: itemTotal });
                }
            });
            
            if (orderLines.length === 0) {
                alert('Please add items to your order 🛒');
                playSound('error');
                return;
            }
            
            const orderId = saveOrder(customerName, whatsappNumber, orderItems, totalPrice);
            const orderCount = getOrderCountForPhone(whatsappNumber);
            
            let message = `🍔 *DJ BITES - PURE VEG* 🍔\n\n`;
            message += `👤 *Customer:* ${customerName}\n`;
            message += `📱 *Phone:* ${whatsappDisplay}\n`;
            message += `🆔 *Order ID:* #${orderId}\n`;
            message += `📊 *Order #${orderCount} today*\n\n`;
            message += `*YOUR ORDER:*\n`;
            message += orderLines.join('\n');
            message += `\n\n*TOTAL: ₹${totalPrice}*\n\n`;
            message += `🙏 Thank you for ordering!\n`;
            message += `⭐ Visit again - DJ Bites`;

            playSound('order');
            
            const encodedMessage = encodeURIComponent(message);
            const url = `https://api.whatsapp.com/send?phone=${whatsappNumber}&text=${encodedMessage}`;
            
            window.open(url, '_blank');
            
            // Clear quantities
            menuItems.forEach(item => quantities[item.id] = 0);
            renderMenu();
            showNotification(`🎉 Order #${orderId} placed!`);

                                        <button class="stock-toggle-btn ${outOfStockItems.includes(item.id) ? 'out' : 'in'}" 
                                                onclick="toggleStock('${item.id}')" style="padding:3px 10px;">
                                            ${outOfStockItems.includes(item.id) ? 'Out' : 'In'} Stock
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                adminArea.innerHTML = `<button class="admin-btn" id="adminLoginBtn"><i class="fas fa-lock"></i> Admin</button>`;
                document.getElementById('adminLoginBtn')?.addEventListener('click', () => {
                    const pwd = prompt('Enter admin password:');
                    if (pwd === 'dj@123') {
                        adminActive = true;
                        renderAdminHeader();
                        renderMenu();
                        playSound('success');
                    } else {
                        alert('Incorrect password');
                        playSound('error');
                    }
                });
                adminSettingsPanel.style.display = 'none';
            }
        }

        function renderMenu() {
            let html = '';
            categories.forEach(cat => {
                const catId = `category-${cat.replace(/\s+/g, '-')}`;
                html += `<div id="${catId}" class="category-section">`;
                html += `<div class="category-header"><i class="fas ${getCategoryIcon(cat)}"></i><h3>${cat}</h3></div>`;
                
                const catItems = menuItems.filter(item => item.category === cat);
                catItems.forEach(item => {
                    const itemId = item.id;
                    const isOutOfStock = outOfStockItems.includes(itemId);
                    const imgSrc = itemImages[itemId] || '';
                    
                    const imgHtml = imgSrc ? 
                        `<img class="item-image" id="img_${itemId}" src="${imgSrc}" alt="${item.name}" 
                              onerror="this.onerror=null; this.src=''; this.parentElement.innerHTML='<div class=\\'image-placeholder\\' id=\\'img_${itemId}\\'><i class=\\'fas fa-image\\'></i><span>photo</span></div>';">` : 
                        `<div class="image-placeholder" id="img_${itemId}"><i class="fas fa-image"></i><span>photo</span></div>`;

                    if (adminActive) {
                        html += `
                            <div class="menu-item ${isOutOfStock ? 'out-of-stock' : ''}">
                                ${isOutOfStock ? '<div class="out-of-stock-badge"><i class="fas fa-times-circle"></i> OUT</div>' : ''}
                                <div class="item-image-block" onclick="zoomImage('${itemId}', '${item.name.replace(/'/g, "\\'")}')">
                                    <div style="position: relative; width: 100%; height: 100%;">
                                        ${imgHtml}
                                        <input type="file" accept="image/*" style="position: absolute; bottom: 5px; right: 5px; width: 30px; height: 30px; opacity: 0; cursor: pointer; z-index: 10;" onclick="event.stopPropagation()" onchange="uploadImage(this, '${itemId}')" title="Upload Photo">
                                        <label style="position: absolute; bottom: 5px; right: 5px; background: #fc8019; color: white; padding: 3px 6px; border-radius: 20px; font-size: 0.6rem; pointer-events: none;"><i class="fas fa-cloud-upload-alt"></i></label>
                                    </div>
                                </div>
                                <div class="item-info">
                                    <input type="text" class="admin-name-input" id="name-${itemId}" value="${item.name}" onchange="updateItemName('${itemId}', this.value)" placeholder="Item name">
                                    <div style="display: flex; align-items: center; gap: 5px; margin-top: 5px;">
                                        <span>₹</span>
                                        <input type="number" class="admin-price-input" id="price-${itemId}" value="${item.price}" step="1" min="0" onchange="updatePrice('${itemId}', this.value)">
                                    </div>
                                    <div class="stock-toggle">
                                        <button class="stock-toggle-btn ${isOutOfStock ? 'out' : 'in'}" onclick="toggleStock('${itemId}')">
                                            ${isOutOfStock ? 'Out' : 'In'} Stock
                                        </button>
                                    </div>
                                </div>
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="window.updateQty('${item.id}', -1)"><i class="fas fa-minus"></i></button>
                                    <span class="qty-num" id="qty-${item.id}">${quantities[item.id] || 0}</span>
                                    <button class="qty-btn" onclick="window.updateQty('${item.id}', 1)"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                        `;
                    } else {
                        if (isOutOfStock) {
                            html += `
                                <div class="menu-item out-of-stock">
                                    <div class="out-of-stock-badge"><i class="fas fa-times-circle"></i> OUT</div>
                                    <div class="item-image-block" onclick="zoomImage('${itemId}', '${item.name.replace(/'/g, "\\'")}')">
                                        ${imgHtml}
                                    </div>
                                    <div class="item-info">
                                        <div class="item-name">${item.name}</div>
                                        <div class="item-price">₹${item.price}</div>
                                    </div>
                                    <div class="qty-control" style="opacity: 0.3; pointer-events: none;">
                                        <button class="qty-btn"><i class="fas fa-minus"></i></button>
                                        <span class="qty-num">0</span>
                                        <button class="qty-btn"><i class="fas fa-plus"></i></button>
                                    </div>
                                </div>
                            `;
                        } else {
                            html += `
                                <div class="menu-item">
                                    <div class="item-image-block" onclick="zoomImage('${itemId}', '${item.name.replace(/'/g, "\\'")}')">
                                        ${imgHtml}
                                    </div>
                                    <div class="item-info">
                                        <div class="item-name">${item.name}</div>
                                        <div class="item-price">₹${item.price}</div>
                                    </div>
                                    <div class="qty-control">
                                        <button class="qty-btn" onclick="window.updateQty('${item.id}', -1)"><i class="fas fa-minus"></i></button>
                                        <span class="qty-num" id="qty-${item.id}">${quantities[item.id] || 0}</span>
                                        <button class="qty-btn" onclick="window.updateQty('${item.id}', 1)"><i class="fas fa-plus"></i></button>
                                    </div>
                                </div>
                            `;
                        }
                    }
                });
                html += `</div>`;
            });
            if (menuContainer) menuContainer.innerHTML = html;
            updateTotals();
        }

        // Initialize
        renderCategoryTabs();
        renderAdminHeader();
        renderMenu();
        updateOutletUI();
        
        // Load images from JSONBin
        setTimeout(() => {
            loadSavedImages();
        }, 500);

        // ESC for zoom
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeZoomModal();
            }
        });
    </script>
</body>
</html>
